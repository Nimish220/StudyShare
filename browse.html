<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Materials — StudyShare</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="browse">
<div class="page-wrapper">
  <nav class="navbar">
    <div class="container">
      <a href="#" onclick="navigateHome(event)" class="navbar-brand">
        <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        <span>StudyShare</span>
      </a>
      <div class="nav-links" id="nav-links"><a href="index.html">Home</a><a href="browse.html">Browse</a></div>
      <div class="nav-auth" id="nav-auth">
        <a href="login.html" class="btn btn-ghost btn-sm">Log in</a>
        <a href="signup.html" class="btn btn-primary btn-sm">Sign up</a>
      </div>
      <button class="hamburger" id="hamburger" aria-label="Menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    </div>
    <div class="mobile-menu" id="mobile-menu"></div>
  </nav>

  <main>
    <div class="container" style="padding-top:2.5rem;padding-bottom:3rem">
      <h1 style="font-size:1.875rem;margin-bottom:1.5rem">Browse Materials</h1>
      <div class="search-wrapper">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="browse-search" class="form-control" placeholder="Search by title, author, or keyword..." style="padding-left:2.5rem;height:48px;font-size:1rem">
      </div>
      <div class="filter-bar" id="filter-bar"></div>
      <p class="results-count" id="results-count"></p>
      <div class="card-grid" id="browse-grid"></div>
      <div id="no-results" style="display:none;text-align:center;padding:5rem 0;color:var(--muted-foreground)">
        <p style="font-size:1.125rem">No materials found matching your search.</p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container"><div class="footer-inner"><div class="footer-bottom" style="border-top:none;margin-top:0">© 2026 StudyShare. All rights reserved.</div></div></div>
  </footer>
</div>
<script src="js/script.js"></script>
</body>
</html>
