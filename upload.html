<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload — StudyShare</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="upload">
<div class="page-wrapper">
  <nav class="navbar">
    <div class="container">
      <a href="#" onclick="navigateHome(event)" class="navbar-brand">
        <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        <span>StudyShare</span>
      </a>
      <div class="nav-links" id="nav-links"><a href="index.html">Home</a><a href="browse.html">Browse</a><a href="upload.html">Upload</a></div>
      <div class="nav-auth" id="nav-auth">
        <a href="login.html" class="btn btn-ghost btn-sm">Log in</a>
        <a href="signup.html" class="btn btn-primary btn-sm">Sign up</a>
      </div>
      <button class="hamburger" id="hamburger" aria-label="Menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    </div>
    <div class="mobile-menu" id="mobile-menu"></div>
  </nav>

  <main>
    <div class="container" style="padding-top:2.5rem;padding-bottom:3rem;max-width:40rem">
      <h1 style="font-size:1.875rem;margin-bottom:0.5rem">Upload Material</h1>
      <p style="color:var(--muted-foreground);margin-bottom:2rem">Share your notes, books, or study materials with the community.</p>

      <form id="upload-form" class="upload-form">
        <div class="upload-zone" id="upload-zone">
          <div class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
          </div>
          <p>Drag & drop your file here</p>
          <p class="sub">or click to browse · PDF, DOCX, PPT, Images (max 50MB)</p>
          <button type="button" class="btn btn-outline" style="margin-top:1rem">Choose File</button>
          <input type="file" id="file-input" accept=".pdf,.doc,.docx,.ppt,.pptx,.png,.jpg" hidden>
        </div>

        <div class="form-group" style="margin-top:1.5rem">
          <label for="title">Title</label>
          <input type="text" id="title" class="form-control" placeholder="e.g. Calculus III Complete Notes" required>
        </div>
        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" class="form-control" rows="4" placeholder="Brief description of the material..."></textarea>
        </div>
        <div class="form-grid-2">
          <div class="form-group">
            <label for="category">Category</label>
            <select id="category" class="form-control" required>
              <option>Computer Science</option>
              <option>Mathematics</option>
              <option>Physics</option>
              <option>Chemistry</option>
              <option>Biology</option>
              <option>History</option>
              <option>Economics</option>
              <option>Literature</option>
              <option>Business</option>
            </select>
          </div>
          <div class="form-group">
            <label for="tags">Tags</label>
            <input type="text" id="tags" class="form-control" placeholder="e.g. calculus, notes">
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-lg btn-full">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Upload Material
        </button>
      </form>
    </div>
  </main>

  <footer class="footer">
    <div class="container"><div class="footer-inner"><div class="footer-bottom" style="border-top:none;margin-top:0">© 2026 StudyShare. All rights reserved.</div></div></div>
  </footer>
</div>
<script src="js/script.js"></script>
</body>
</html>
