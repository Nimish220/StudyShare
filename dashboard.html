<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — StudyShare</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="dashboard">
<div class="page-wrapper">
  <nav class="navbar">
    <div class="container">
      <a href="#" onclick="navigateHome(event)" class="navbar-brand">
        <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        <span>StudyShare</span>
      </a>
      <div class="nav-links" id="nav-links"><a href="index.html">Home</a><a href="browse.html">Browse</a><a href="upload.html">Upload</a><a href="dashboard.html">Dashboard</a></div>
      <div class="nav-auth" id="nav-auth">
        <a href="login.html" class="btn btn-ghost btn-sm">Log in</a>
        <a href="signup.html" class="btn btn-primary btn-sm">Sign up</a>
      </div>
      <button class="hamburger" id="hamburger" aria-label="Menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    </div>
    <div class="mobile-menu" id="mobile-menu"></div>
  </nav>

  <main>
    <div class="container dashboard-page">
      <h1>User Dashboard</h1>
      <p class="subtitle">Welcome back, <span id="user-name">User123</span></p>

      <div class="stat-cards">
        <div class="stat-card stat-card-center">
          <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>
          <div class="value">12</div>
          <div class="label">Uploads</div>
        </div>
        <div class="stat-card stat-card-center">
          <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></div>
          <div class="value">340</div>
          <div class="label">Downloads</div>
        </div>
        <div class="stat-card stat-card-center">
          <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></div>
          <div class="value">28</div>
          <div class="label">Bookmarks</div>
        </div>
        <div class="stat-card stat-card-center">
          <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
          <div class="value">4.6</div>
          <div class="label">Avg Rating</div>
        </div>
      </div>

      <div class="action-buttons">
        <a href="upload.html" class="btn btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Upload New
        </a>
        <a href="browse.html" class="btn btn-outline">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          Browse Notes
        </a>
      </div>

      <h2 style="font-size:1.25rem;margin-bottom:1rem">Your Bookmarked Materials</h2>
      <div class="card-grid-3" id="bookmarked-grid"></div>
    </div>
  </main>

  <footer class="footer">
    <div class="container"><div class="footer-inner"><div class="footer-bottom" style="border-top:none;margin-top:0">© 2026 StudyShare. All rights reserved.</div></div></div>
  </footer>
</div>
<script src="js/script.js"></script>
</body>
</html>
