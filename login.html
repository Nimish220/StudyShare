<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — StudyShare</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="login">
<div class="page-wrapper">
  <nav class="navbar">
    <div class="container">
      <a href="#" onclick="navigateHome(event)" class="navbar-brand">
        <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        <span>StudyShare</span>
      </a>
      <div class="nav-links" id="nav-links">
        <a href="index.html">Home</a>
        <a href="browse.html">Browse</a>
      </div>
      <div class="nav-auth" id="nav-auth">
        <a href="login.html" class="btn btn-ghost btn-sm">Log in</a>
        <a href="signup.html" class="btn btn-primary btn-sm">Sign up</a>
      </div>
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
    <div class="mobile-menu" id="mobile-menu"></div>
  </nav>

  <main>
    <div class="auth-wrapper">
      <div class="auth-card">
        <div class="auth-header">
          <div class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          </div>
          <h1>Welcome back</h1>
          <p>Sign in to your StudyShare account</p>
        </div>

        <!-- Role Toggle -->
        <div class="role-toggle">
          <button class="active" data-role="user">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span class="role-label">User</span>
          </button>
          <button data-role="admin">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            <span class="role-label">Admin</span>
          </button>
          <button data-role="superadmin">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2z"/></svg>
            <span class="role-label">Super Admin</span>
          </button>
        </div>

        <form id="login-form">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <div class="form-row">
              <label for="password">Password</label>
              <a href="#">Forgot?</a>
            </div>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
          </div>
          <button type="submit" id="submit-btn" class="btn btn-primary btn-lg btn-full">Sign in as User</button>
        </form>

        <p class="auth-footer">Don't have an account? <a href="signup.html">Sign up</a></p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-inner">
        <div class="footer-bottom" style="border-top:none;margin-top:0">© 2026 StudyShare. All rights reserved.</div>
      </div>
    </div>
  </footer>
</div>
<script src="js/script.js"></script>
</body>
</html>
