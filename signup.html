<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — StudyShare</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="signup">
<div class="page-wrapper">
  <nav class="navbar">
    <div class="container">
      <a href="#" onclick="navigateHome(event)" class="navbar-brand">
        <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        <span>StudyShare</span>
      </a>
      <div class="nav-links" id="nav-links"><a href="index.html">Home</a><a href="browse.html">Browse</a></div>
      <div class="nav-auth" id="nav-auth">
        <a href="login.html" class="btn btn-ghost btn-sm">Log in</a>
        <a href="signup.html" class="btn btn-primary btn-sm">Sign up</a>
      </div>
      <button class="hamburger" id="hamburger" aria-label="Menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    </div>
    <div class="mobile-menu" id="mobile-menu"></div>
  </nav>

  <main>
    <div class="auth-wrapper">
      <div class="auth-card">
        <div class="auth-header">
          <div class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          </div>
          <h1>Create an account</h1>
          <p>Join StudyShare and start sharing</p>
        </div>
        <form id="signup-form">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" class="form-control" placeholder="Anonymous" required>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
          </div>
          <div class="form-group">
            <label for="confirm">Confirm Password</label>
            <input type="password" id="confirm" class="form-control" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-primary btn-lg btn-full">Create Account</button>
        </form>
        <p class="auth-footer">Already have an account? <a href="login.html">Sign in</a></p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container"><div class="footer-inner"><div class="footer-bottom" style="border-top:none;margin-top:0">© 2026 StudyShare. All rights reserved.</div></div></div>
  </footer>
</div>
<script src="js/script.js"></script>
</body>
</html>
